name: Test Project1
on: push

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get code 
        uses: actions/checkout@v5

      - name: Install NodeJs
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install  # changed from npm ci

      - name: Run tests
        run: npm test